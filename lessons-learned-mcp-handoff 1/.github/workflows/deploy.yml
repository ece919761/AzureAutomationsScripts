name: build-test-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploymentMode:
        description: "Topology to deploy"
        type: choice
        options: [public, private]
        default: public

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Build container image (validation)
        run: docker build -t lessons-learned-mcp:ci .

  deploy:
    name: Provision & deploy (azd)
    needs: build-test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      DEPLOYMENT_MODE: ${{ github.event.inputs.deploymentMode || vars.DEPLOYMENT_MODE }}
      PROVIDER_MODE: ${{ vars.PROVIDER_MODE }}
      AUTH_MODE: ${{ vars.AUTH_MODE }}
      ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
      MCP_API_CLIENT_ID: ${{ vars.MCP_API_CLIENT_ID }}
      MCP_API_AUDIENCE: ${{ vars.MCP_API_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Log in with azd (federated OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"
      - name: Provision infrastructure
        run: azd provision --no-prompt
      - name: Deploy application
        run: azd deploy --no-prompt
