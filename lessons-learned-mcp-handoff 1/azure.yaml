# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: lessons-learned-mcp
metadata:
  template: lessons-learned-mcp@0.1.0

# The container image is built from the repo-root Dockerfile and deployed to the
# Container App tagged 'azd-service-name: mcp' by the Bicep in ./infra.
services:
  mcp:
    project: .
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

infra:
  provider: bicep
  path: infra
  module: main
